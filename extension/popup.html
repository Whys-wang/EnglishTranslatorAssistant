<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #start { background: #2e7d32; color: #fff; }
      #stop  { background: #c62828; color: #fff; }
      #status { font-size: 12px; color: #555; }
      .lang-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 12px;
        color: #333;
      }
      .lang-row label { width: 48px; flex: none; }
      .lang-row select {
        flex: 1;
        padding: 5px 6px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 12px;
      }
      .lang-arrow { text-align: center; color: #888; font-size: 12px; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <h1>AI 同声传译助手</h1>

    <div class="lang-row">
      <label for="src">源语言</label>
      <select id="src">
        <option value="">自动检测</option>
        <option value="英语">英语</option>
        <option value="中文">中文</option>
        <option value="日语">日语</option>
        <option value="韩语">韩语</option>
        <option value="法语">法语</option>
        <option value="德语">德语</option>
        <option value="西班牙语">西班牙语</option>
        <option value="俄语">俄语</option>
        <option value="粤语">粤语</option>
      </select>
    </div>
    <div class="lang-arrow">↓ 翻译为 ↓</div>
    <div class="lang-row">
      <label for="tgt">目标语言</label>
      <select id="tgt">
        <option value="中文">中文</option>
        <option value="英语">英语</option>
        <option value="日语">日语</option>
        <option value="韩语">韩语</option>
        <option value="法语">法语</option>
        <option value="德语">德语</option>
        <option value="西班牙语">西班牙语</option>
        <option value="俄语">俄语</option>
        <option value="粤语">粤语</option>
      </select>
    </div>

    <button id="start">开始翻译</button>
    <button id="stop">停止</button>
    <div id="status">未连接</div>
    <script src="popup.js"></script>
  </body>
</html>
