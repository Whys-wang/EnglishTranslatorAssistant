<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #start { background: #2e7d32; color: #fff; }
      #stop  { background: #c62828; color: #fff; }
      #status { font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <h1>AI 同声传译助手</h1>
    <button id="start">开始翻译</button>
    <button id="stop">停止</button>
    <div id="status">未连接</div>
    <script src="popup.js"></script>
  </body>
</html>
